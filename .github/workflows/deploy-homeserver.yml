name: Deploy Harvester to Home Server

on:
  workflow_run:
    workflows: ["Harvester Go CI"]
    branches: ["prod"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check deploy secrets
        id: deploy_guard
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ] || [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Deploy via webhook
        if: steps.deploy_guard.outputs.enabled == 'true'
        run: |
          RESPONSE=$(curl -sf -X POST \
            "${{ secrets.DEPLOY_WEBHOOK_URL }}/deploy?service=harvester-go" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true' || exit 1
